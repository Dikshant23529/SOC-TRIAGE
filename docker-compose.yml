services:
  triage:
    build: .
    image: ${DOCKER_IMAGE:-soc-alert-triage:local}
    ports:
      - "${PORT:-8000}:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/triage.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      STATIC_DIR: /app/static
    volumes:
      - triage-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional Postgres for production
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-triage}
      POSTGRES_DB: triage
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  triage-data:
  pg-data:
