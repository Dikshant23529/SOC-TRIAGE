name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/*
      - release/*
      - hotfix/*

  pull_request:
    branches:
      - main
      - develop
      - release/*

  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
        

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json   

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: soc-alert-triage:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend
      - docker

    if: success()

    steps:
      - name: Success
        run: |
          echo "==================================="
          echo "Backend Tests Passed"
          echo "Frontend Build Passed"
          echo "Docker Build Passed"
          echo "==================================="
