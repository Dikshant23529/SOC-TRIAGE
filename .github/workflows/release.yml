name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Parse version from tag (remove 'v' prefix)
      - name: Parse version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Setup Python with caching
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      # Run backend tests
      - name: Backend tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pytest -q

      # Setup Node.js with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # Build frontend
      - name: Frontend build
        working-directory: frontend
        run: |
          # Check if package-lock.json exists
          if [ ! -f "package-lock.json" ]; then
            echo "⚠️ package-lock.json not found! Generating one..."
            npm install
            echo "⚠️ Please commit package-lock.json to your repository for faster builds"
          fi
          npm ci
          npm run build

      # Setup Docker QEMU for multi-arch builds
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      # Setup Docker Buildx
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # Check if Docker Hub credentials are configured
      - name: Check Docker Hub credentials
        id: docker_check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "✅ Docker Hub credentials found"
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ Docker Hub credentials not found - image will be built but not pushed"
          fi

      # Login to Docker Hub (only if credentials exist)
      - name: Login to Docker Hub
        if: steps.docker_check.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push Docker image
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.docker_check.outputs.configured == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/soc-alert-triage:${{ steps.ver.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/soc-alert-triage:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=SOC Alert Triage
            org.opencontainers.image.description=Security Operations Center Alert Triage System
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
