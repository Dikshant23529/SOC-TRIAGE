name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Frontend build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/soc-alert-triage:${{ steps.ver.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/soc-alert-triage:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## SOC Alert Triage ${{ github.ref_name }}

            Docker image (when `DOCKERHUB_USERNAME` secret is set):
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/soc-alert-triage:${{ steps.ver.outputs.version }}
            docker run -p 8000:8000 -e SECRET_KEY=your-secret ${{ secrets.DOCKERHUB_USERNAME }}/soc-alert-triage:${{ steps.ver.outputs.version }}
            ```

            Open http://localhost:8000 after start.

  tag-on-main:
    if: false
    runs-on: ubuntu-latest
